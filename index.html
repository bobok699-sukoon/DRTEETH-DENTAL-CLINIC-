<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr TEETH Dental Clinic - Smart Review Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; color: #333; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .card { background: white; padding: 28px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 440px; width: 100%; text-align: center; }
        h1 { color: #008080; font-size: 26px; margin-bottom: 6px; font-weight: 700; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.4; }
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 24px; background-color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
        .btn-gen { background: #008080; color: white; }
        .btn-gen:hover { background: #006666; }
        .review-box { background: #f9f9f9; border-left: 4px solid #008080; padding: 16px; border-radius: 4px; margin-top: 24px; text-align: left; font-style: italic; display: none; line-height: 1.5; font-size: 15px; color: #444; }
        .btn-action { background: #4CAF50; color: white; display: none; }
        .btn-action:hover { background: #43a047; }
        .btn-google { background: #4285F4; color: white; display: none; }
        .btn-google:hover { background: #357ae8; }
    </style>
</head>
<body>

<div class="card">
    <h1>Dr TEETH Dental Clinic</h1>
    <p>Thank you for placing your trust in our care! Select your treatment below to instantly create a personalized review draft for Google.</p>
    
    <label for="service">What treatment did you receive today?</label>
    <select id="service">
        <option value="Routine checkup/X-ray">Routine Checkup / X-ray</option>
        <option value="Dental cleaning/polishing">Dental Cleaning / Polishing</option>
        <option value="Tooth Filling">Tooth Filling</option>
        <option value="Root canal treatment">Root Canal Treatment</option>
        <option value="Tooth extraction">Tooth Extraction</option>
        <option value="IMPLANT treatment/Consultation">IMPLANT Treatment / Consultation</option>
        <option value="Wisdom tooth removal">Wisdom Tooth Removal</option>
        <option value="Crown placement">Crown Placement</option>
        <option value="Bridge treatment">Bridge Treatment</option>
        <option value="Denture">Denture Work</option>
        <option value="Teeth whitening">Teeth Whitening</option>
        <option value="Braces treatment">Braces Treatment</option>
        <option value="Clear aligners">Clear Aligners</option>
        <option value="Gum surgery">Gum Surgery</option>
        <option value="Child dental treatment">Child Dental Treatment</option>
        <option value="Emergency dental treatment">Emergency Dental Treatment</option>
        <option value="Pain relief / sensitivity treatment">Pain Relief & Sensitivity Care</option>
        <option value="Cosmetic restoration/Veneers">Cosmetic Restoration / Veneers</option>
        <option value="Night guard / splint">Night Guard / Splint</option>
    </select>

    <button class="btn-gen" onclick="generateReview()">✨ Generate My AI Review</button>

    <div class="review-box" id="reviewBox"></div>
    <button class="btn-action" id="copyBtn" onclick="copyText()">📋 Copy Review Text</button>
    <button class="btn-google" id="googleBtn" onclick="openGoogle()">⭐ Paste & Submit on Google</button>
</div>

    ];

    const treatmentMiddles = {
        "Routine checkup/X-ray": [
            "I went in for a routine checkup/X-ray and appreciated how thoroughly they checked everything.",
            "The doctor performed a detailed routine checkup/X-ray and carefully mapped out my entire dental health status."
        ],
        "Dental cleaning/polishing": [

        "Tooth extraction": [

            "They managed my infected tooth extraction incredibly well. The procedure was gentle and completely safe."
        ],
        "IMPLANT treatment/Consultation": [
            "Received a professional IMPLANT treatment/Consultation today. They mapped everything with advanced tools.",
            "Very satisfied with the transparency and premium tech used during my implant treatment consultation."
        ],
        "Wisdom tooth removal": [
            "Had my wisdom tooth removal surgical procedure completed. The healing has been fast thanks to their precision work.",
            "The surgical extraction for my wisdom tooth removal was completely stress-free and smooth."
        ],
        "Crown placement": [
            "The doctor did a precise job with my permanent crown placement. The customized fit matches my adjacent teeth perfectly.",
            "The materials used for my crown placement are excellent. Feels just like my original tooth."
        ],
        "Bridge treatment": [
            "My smile is fully restored thanks to their excellent bridge treatment. I can chew normally again.",
            "The structural fit and aesthetics of my bridge treatment are absolute perfection. Fantastic workmanship."
        ],
        "Denture": [
            "They created a highly stable, comfortable custom denture for me. Truly improved my daily comfort.",
            "The team spent substantial time adjusting my denture until the fit was exactly right and completely secure."
        ],
        "Teeth whitening": [

        "Braces treatment": [

        "Child dental treatment": [
            "They are brilliant with pediatric care! My kid was smiling through the whole child dental treatment.",
            "The best child dental treatment environment. They kept my daughter completely entertained and secure."
        ],
        "Emergency dental treatment": [
            "They accepted me instantly without warning for an emergency dental treatment and relieved my acute pain.",
            "Outstanding speed and medical precision during a severe emergency dental treatment situation."
        ],
        "Pain relief / sensitivity treatment": [
            "Got instant pain relief / sensitivity treatment today. They targeted the structural issue flawlessly.",
            "Highly accurate desensitization care. Finally, I can drink cold water without sharp sensitivity pain."
        ],
        "Cosmetic restoration/Veneers": [
            "The visual design of my cosmetic restoration/Veneers looks astonishingly natural and highly premium.",
            "Incredible skill with ceramic veneers and comprehensive cosmetic restoration details."
        ],
        "Night guard / splint": [
            "The precision fit of my custom night guard / splint has instantly alleviated all my morning jaw stiffness.",
            "High-quality medical grade polymers used for my bruxism night guard / splint. Fits very comfortably."
        ]
    };

    // Part 4: Hygiene & Final Trust Anchors
    const closers = [
        "The overall setup on Jail Road Nashik Road is exceptionally clean and well-maintained.",
        "The clinic prioritizes strict hygiene parameters. Highly recommend to everyone nearby!",
        "Very courteous support team and transparent billing structures.",
        "Will definitely continue using them for all my long-term dental requirements.",
        "The treatment fees are completely worth the premium expert care they deliver.",
        "If you want safe, advanced treatments, this is the clinic to rely on."
    ];

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateReview() {
        const selectedService = document.getElementById('service').value;
        
        // Randomly combine items to hit the 360 mathematical variations mark per service
        const part1 = getRandomItem(openers);
        const part2 = getRandomItem(localSEOAnchors);
        const part3 = getRandomItem(treatmentMiddles[selectedService]);
        const part4 = getRandomItem(closers);
        
        // Form a naturally reading human review paragraph
        const finalReview = `${part1} ${part2} ${part3} ${part4}`;
        
        const box = document.getElementById('reviewBox');
        box.innerText = finalReview;
        box.style.display = 'block';
        
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('googleBtn').style.display = 'block';
    }

    function copyText() {
        const text = document.getElementById('reviewBox').innerText;
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = text;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        tempTextArea.setSelectionRange(0, 99999); 
        
        try {
            document.execCommand("copy");
            alert("📋 Review text successfully copied! Click the blue button next to paste it into Google Maps.");
        } catch (err) {
            navigator.clipboard.writeText(text);
        }
        document.body.removeChild(tempTextArea);
    }

    function openGoogle() {
        window.open("https://g.page/r/CeoFrMcBaF_GEBM/review", "_blank");
    }
</script>

</body>
</html>
