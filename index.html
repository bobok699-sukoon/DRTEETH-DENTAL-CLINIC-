    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // Shuffle an array to draw multiple non-repeating items
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateReview() {
        const ageType = document.getElementById('ageGroup').value;
        const selectedService = document.getElementById('service').value;
        
        let reviewSentences = [];
        
        // Dynamic Length Selector Logic
        const diceRoll = Math.random(); // Shuffles layout styles automatically
        
        if (diceRoll < 0.34) {
            // OPTION A: Short & Punchy (3 to 4 Sentences)
            reviewSentences.push(getRandomItem(generalOpeners));
            reviewSentences.push(getRandomItem(localSEOAnchors));
            reviewSentences.push(getRandomItem(treatmentMiddles[selectedService]));
            reviewSentences.push(getRandomItem(closers));
        } 
        else if (diceRoll < 0.67) {
            // OPTION B: Medium Length (5 to 6 Sentences)
            reviewSentences.push(getRandomItem(ageOpeners[ageType]));
            reviewSentences.push(getRandomItem(localSEOAnchors));
            reviewSentences.push(getRandomItem(treatmentMiddles[selectedService]));
            reviewSentences.push(getRandomItem(extraTrustSentences));
            reviewSentences.push(getRandomItem(closers));
        } 
        else {
            // OPTION C: Long In-Depth Review (7 to 10 Sentences)
            reviewSentences.push(getRandomItem(ageOpeners[ageType]));
            reviewSentences.push(getRandomItem(generalOpeners));
            reviewSentences.push(getRandomItem(localSEOAnchors));
            
            // Inject two distinct sentences regarding treatment to show deep detail
            let treatmentShuffled = shuffleArray(treatmentMiddles[selectedService]);
            reviewSentences.push(treatmentShuffled[0]);
            if(treatmentShuffled[1]) reviewSentences.push(treatmentShuffled[1]);
            
            reviewSentences.push(getRandomItem(extraTrustSentences));
            reviewSentences.push(getRandomItem(staffSentences));
            
            let closersShuffled = shuffleArray(closers);
            reviewSentences.push(closersShuffled[0]);
            reviewSentences.push(closersShuffled[1]);
        }
        
        // Flatten sentences into a clean paragraph structure
        const finalReviewText = reviewSentences.join(" ");
        
        const box = document.getElementById('reviewBox');
        box.innerText = finalReviewText;
        box.style.display = 'block';
        
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('googleBtn').style.display = 'block';
    }

    function copyText() {
        const text = document.getElementById('reviewBox').innerText;
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = text;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        tempTextArea.setSelectionRange(0, 99999); 
        try {
            document.execCommand("copy");
            alert("📋 Copied! Now open Google and paste.");
        } catch (err) {
            navigator.clipboard.writeText(text);
        }
        document.body.removeChild(tempTextArea);
    }

    function openGoogle() {
        window.open("https://g.page/r/CeoFrMcBaF_GEBM/review", "_blank");
